<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>

    <!-- ── Backgrounds ───────────────────────────────────── -->
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#020b18"/>
      <stop offset="55%"  stop-color="#071325"/>
      <stop offset="100%" stop-color="#0c1e38"/>
    </linearGradient>

    <!-- Primary blue light source (upper-right) -->
    <radialGradient id="ls1" cx="1344" cy="218" r="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a5fa8" stop-opacity="0.55"/>
      <stop offset="38%"  stop-color="#0d3564" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#020b18" stop-opacity="0"/>
    </radialGradient>

    <!-- Cyan accent glow tight around focal node -->
    <radialGradient id="ls2" cx="1350" cy="210" r="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient bottom-left warmth -->
    <radialGradient id="ls3" cx="360" cy="980" r="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0d6efd" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#020b18" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette (darkens edges) -->
    <radialGradient id="vgn" cx="960" cy="540" r="920" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#010810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#010810" stop-opacity="0.68"/>
    </radialGradient>

    <!-- ── Filters ─────────────────────────────────────── -->

    <!-- Standard node glow -->
    <filter id="gA" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="7"   result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for the key focal node -->
    <filter id="gB" x="-500%" y="-500%" width="1100%" height="1100%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"  result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle line glow -->
    <filter id="gC" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft particle glow (blurred halo only) -->
    <filter id="gP" x="-400%" y="-400%" width="900%" height="900%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

  </defs>

  <!-- ════════════════════════════════════════════
       LAYER 1 — BACKGROUND
       ════════════════════════════════════════════ -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#ls1)"/>
  <rect width="1920" height="1080" fill="url(#ls2)"/>
  <rect width="1920" height="1080" fill="url(#ls3)"/>

  <!-- ════════════════════════════════════════════
       LAYER 2 — DIAGONAL GRID LINES
       slope ≈ ±0.466  (≈ 25° from horizontal)
       Direction A: y = 0.466x + b  (down-right)
       Direction B: y = −0.466x + b (down-left)
       At x=0: y=b ; at x=1920: y=b±895
       ════════════════════════════════════════════ -->

  <!-- Direction A -->
  <g stroke="#3a78b5" stroke-width="0.65" fill="none">
    <line x1="0" y1="-500" x2="1920" y2="395"  opacity="0.055"/>
    <line x1="0" y1="-300" x2="1920" y2="595"  opacity="0.060"/>
    <line x1="0" y1="-100" x2="1920" y2="795"  opacity="0.070"/>
    <line x1="0" y1=" 100" x2="1920" y2="995"  opacity="0.065"/>
    <line x1="0" y1=" 300" x2="1920" y2="1195" opacity="0.055"/>
    <line x1="0" y1=" 500" x2="1920" y2="1395" opacity="0.045"/>
    <line x1="0" y1=" 700" x2="1920" y2="1595" opacity="0.035"/>
  </g>

  <!-- Direction B -->
  <g stroke="#3a78b5" stroke-width="0.65" fill="none">
    <line x1="0" y1=" 700" x2="1920" y2="-195" opacity="0.048"/>
    <line x1="0" y1=" 900" x2="1920" y2="   5" opacity="0.062"/>
    <line x1="0" y1="1100" x2="1920" y2=" 205" opacity="0.060"/>
    <line x1="0" y1="1300" x2="1920" y2=" 405" opacity="0.055"/>
    <line x1="0" y1="1500" x2="1920" y2=" 605" opacity="0.048"/>
    <line x1="0" y1="1700" x2="1920" y2=" 805" opacity="0.038"/>
    <line x1="0" y1="1900" x2="1920" y2="1005" opacity="0.028"/>
  </g>

  <!-- ════════════════════════════════════════════
       LAYER 3 — LOW-POLY MESH
       Very translucent triangles in corners / edges
       ════════════════════════════════════════════ -->
  <g stroke="#1e90ff" stroke-width="0.4" stroke-opacity="0.14" fill-opacity="0.028">

    <!-- Upper-left cluster -->
    <polygon points="0,0 320,0 215,275 0,195"        fill="#0d6efd"/>
    <polygon points="320,0 560,0 475,238 215,275"    fill="#1660b0"/>
    <polygon points="0,195 215,275 175,475 0,375"    fill="#0d6efd"/>
    <polygon points="215,275 475,238 415,475 175,475" fill="#1a5ca8"/>
    <polygon points="175,475 415,475 378,672 98,638" fill="#0d6efd"/>
    <polygon points="415,475 598,518 555,718 378,672" fill="#1660b0"/>

    <!-- Upper-right cluster (frames the focal light area) -->
    <polygon points="1515,0 1920,0 1920,275 1678,158"  fill="#1e90ff"/>
    <polygon points="1678,158 1920,275 1878,475 1598,338" fill="#0d6efd"/>
    <polygon points="1798,455 1920,478 1920,675 1758,618" fill="#0d6efd"/>

    <!-- Bottom-right -->
    <polygon points="1395,895 1678,798 1920,898 1920,1080 1395,1080" fill="#0d6efd"/>
    <polygon points="1098,998 1395,895 1395,1080 1098,1080"           fill="#1660b0"/>

    <!-- Bottom-left -->
    <polygon points="0,898 278,838 318,1080 0,1080"   fill="#0d6efd"/>
    <polygon points="278,838 578,898 558,1080 318,1080" fill="#1a5ca8"/>

  </g>

  <!-- ════════════════════════════════════════════
       LAYER 4 — NETWORK CONNECTION LINES

       Node coordinates:
         Focal cluster (near light source, ~70% x, ~20% y)
           N1  1350  220   ← KEY NODE
           N2  1198  168
           N3  1485  170
           N4  1570  268
           N5  1282  318
           N6  1095  252
           N7  1168  395
           N8  1412  398
           N9  1650  198
           N10 1740  295
         Mid-left cluster
           N11  868  268
           N12  778  368
           N13  938  452
           N14  728  488
           N15 1048  168
         Left cluster
           N16  428  488
           N17  358  588
           N18  288  688
           N19  498  648
           N20  568  468
         Right-extended cluster
           N21 1760  398
           N22 1848  498
           N23 1718  558
           N24 1620  448
         Bottom cluster
           N25  958  748
           N26  868  848
           N27 1078  838
           N28 1208  748
           N29 1308  858
           N30  778  948
       ════════════════════════════════════════════ -->

  <!-- Long-range / inter-cluster links (faintest) -->
  <g stroke="#0d6efd" stroke-opacity="0.10" stroke-width="0.4" fill="none">
    <line x1="1048" y1="168" x2="868"  y2="268"/>
    <line x1="1095" y1="252" x2="868"  y2="268"/>
    <line x1="1168" y1="395" x2="938"  y2="452"/>
    <line x1="938"  y1="452" x2="728"  y2="488"/>
    <line x1="728"  y1="488" x2="568"  y2="468"/>
    <line x1="568"  y1="468" x2="428"  y2="488"/>
    <line x1="1282" y1="318" x2="938"  y2="452"/>
    <line x1="1168" y1="395" x2="958"  y2="748"/>
    <line x1="1282" y1="318" x2="1208" y2="748"/>
    <line x1="938"  y1="452" x2="868"  y2="848"/>
    <line x1="1208" y1="748" x2="1412" y2="398"/>
    <line x1="1650" y1="198" x2="1920" y2="140"/>
    <line x1="1740" y1="295" x2="1920" y2="350"/>
    <line x1="288"  y1="688" x2="0"    y2="780"/>
    <line x1="428"  y1="488" x2="220"  y2="338"/>
    <line x1="868"  y1="848" x2="778"  y2="948"/>
    <line x1="1208" y1="748" x2="1308" y2="858"/>
    <line x1="1412" y1="398" x2="1620" y2="448"/>
  </g>

  <!-- Mid-range cluster connections -->
  <g stroke="#1e90ff" stroke-opacity="0.20" stroke-width="0.65" fill="none" filter="url(#gC)">
    <!-- Left cluster -->
    <line x1="428" y1="488" x2="358" y2="588"/>
    <line x1="428" y1="488" x2="498" y2="648"/>
    <line x1="358" y1="588" x2="288" y2="688"/>
    <line x1="358" y1="588" x2="498" y2="648"/>
    <line x1="498" y1="648" x2="568" y2="468"/>
    <line x1="728" y1="488" x2="428" y2="488"/>
    <!-- Mid-left cluster -->
    <line x1="868" y1="268" x2="778" y2="368"/>
    <line x1="868" y1="268" x2="938" y2="452"/>
    <line x1="868" y1="268" x2="1048" y2="168"/>
    <line x1="778" y1="368" x2="728" y2="488"/>
    <line x1="778" y1="368" x2="938" y2="452"/>
    <line x1="938" y1="452" x2="728" y2="488"/>
    <!-- Bottom cluster -->
    <line x1="958"  y1="748" x2="868"  y2="848"/>
    <line x1="958"  y1="748" x2="1078" y2="838"/>
    <line x1="958"  y1="748" x2="1208" y2="748"/>
    <line x1="1078" y1="838" x2="1208" y2="748"/>
    <line x1="1078" y1="838" x2="1308" y2="858"/>
    <!-- Right-extended cluster -->
    <line x1="1760" y1="398" x2="1848" y2="498"/>
    <line x1="1760" y1="398" x2="1718" y2="558"/>
    <line x1="1760" y1="398" x2="1620" y2="448"/>
    <line x1="1848" y1="498" x2="1718" y2="558"/>
    <line x1="1620" y1="448" x2="1718" y2="558"/>
    <!-- Bridge N6→N15, N6→N2 -->
    <line x1="1095" y1="252" x2="1048" y2="168"/>
    <line x1="1095" y1="252" x2="1198" y2="168"/>
  </g>

  <!-- Primary focal-cluster connections (brightest lines) -->
  <g stroke="#1e90ff" stroke-opacity="0.38" stroke-width="0.88" fill="none" filter="url(#gC)">
    <line x1="1350" y1="220" x2="1198" y2="168"/>
    <line x1="1350" y1="220" x2="1485" y2="170"/>
    <line x1="1350" y1="220" x2="1570" y2="268"/>
    <line x1="1350" y1="220" x2="1282" y2="318"/>
    <line x1="1350" y1="220" x2="1095" y2="252"/>
    <line x1="1198" y1="168" x2="1095" y2="252"/>
    <line x1="1198" y1="168" x2="1282" y2="318"/>
    <line x1="1198" y1="168" x2="1485" y2="170"/>
    <line x1="1485" y1="170" x2="1570" y2="268"/>
    <line x1="1485" y1="170" x2="1650" y2="198"/>
    <line x1="1570" y1="268" x2="1412" y2="398"/>
    <line x1="1570" y1="268" x2="1740" y2="295"/>
    <line x1="1282" y1="318" x2="1412" y2="398"/>
    <line x1="1282" y1="318" x2="1168" y2="395"/>
    <line x1="1095" y1="252" x2="1168" y2="395"/>
    <line x1="1412" y1="398" x2="1168" y2="395"/>
    <line x1="1740" y1="295" x2="1760" y2="398"/>
    <line x1="1650" y1="198" x2="1760" y2="398"/>
  </g>

  <!-- Cyan accent connections (near focal) -->
  <g stroke="#00d4ff" stroke-opacity="0.22" stroke-width="0.6" fill="none">
    <line x1="1350" y1="220" x2="1650" y2="198"/>
    <line x1="1350" y1="220" x2="1740" y2="295"/>
  </g>

  <!-- ════════════════════════════════════════════
       LAYER 5 — NODES
       ════════════════════════════════════════════ -->

  <!-- Dim nodes (far from focal point) -->
  <g fill="#2d72b0" filter="url(#gA)">
    <circle cx="428"  cy="488" r="2.2" opacity="0.50"/>
    <circle cx="358"  cy="588" r="1.8" opacity="0.45"/>
    <circle cx="288"  cy="688" r="1.5" opacity="0.40"/>
    <circle cx="498"  cy="648" r="1.8" opacity="0.45"/>
    <circle cx="568"  cy="468" r="2.0" opacity="0.48"/>
    <circle cx="728"  cy="488" r="2.0" opacity="0.50"/>
    <circle cx="868"  cy="848" r="1.5" opacity="0.40"/>
    <circle cx="1078" cy="838" r="1.5" opacity="0.40"/>
    <circle cx="1308" cy="858" r="1.5" opacity="0.40"/>
    <circle cx="778"  cy="948" r="1.2" opacity="0.35"/>
  </g>

  <!-- Medium nodes -->
  <g fill="#4a9eff" filter="url(#gA)">
    <circle cx="1048" cy="168" r="2.5" opacity="0.65"/>
    <circle cx="868"  cy="268" r="2.5" opacity="0.62"/>
    <circle cx="778"  cy="368" r="2.2" opacity="0.58"/>
    <circle cx="938"  cy="452" r="2.2" opacity="0.60"/>
    <circle cx="1168" cy="395" r="2.8" opacity="0.68"/>
    <circle cx="1412" cy="398" r="2.8" opacity="0.70"/>
    <circle cx="1740" cy="295" r="2.5" opacity="0.65"/>
    <circle cx="1650" cy="198" r="2.8" opacity="0.68"/>
    <circle cx="1760" cy="398" r="2.2" opacity="0.60"/>
    <circle cx="1848" cy="498" r="2.0" opacity="0.55"/>
    <circle cx="1718" cy="558" r="1.8" opacity="0.55"/>
    <circle cx="1620" cy="448" r="2.2" opacity="0.60"/>
    <circle cx="958"  cy="748" r="2.0" opacity="0.55"/>
    <circle cx="1208" cy="748" r="2.0" opacity="0.55"/>
  </g>

  <!-- Bright nodes (close to focal cluster) -->
  <g filter="url(#gA)">
    <circle cx="1095" cy="252" r="3.2" fill="#5ab4ff" opacity="0.80"/>
    <circle cx="1198" cy="168" r="3.5" fill="#5ab4ff" opacity="0.82"/>
    <circle cx="1282" cy="318" r="3.2" fill="#5ab4ff" opacity="0.78"/>
    <circle cx="1485" cy="170" r="3.5" fill="#5ab4ff" opacity="0.82"/>
    <circle cx="1570" cy="268" r="3.2" fill="#5ab4ff" opacity="0.80"/>
  </g>

  <!-- KEY FOCAL NODE — strong glow -->
  <g filter="url(#gB)">
    <circle cx="1350" cy="220" r="5.5" fill="#00d4ff" opacity="0.90"/>
  </g>
  <!-- Bright inner core (no filter, drawn on top) -->
  <circle cx="1350" cy="220" r="2.2" fill="#dff8ff" opacity="0.95"/>

  <!-- ════════════════════════════════════════════
       LAYER 6 — SCATTERED PARTICLES
       Two passes: blurred halo + sharp dot
       ════════════════════════════════════════════ -->

  <!-- Halo pass -->
  <g filter="url(#gP)" fill="#1e6ab0" opacity="0.55">
    <circle cx="122"  cy="184" r="1.8"/>  <circle cx="248"  cy="418" r="1.5"/>
    <circle cx="180"  cy="648" r="1.8"/>  <circle cx="382"  cy="178" r="1.5"/>
    <circle cx="522"  cy="378" r="1.5"/>  <circle cx="648"  cy="188" r="1.5"/>
    <circle cx="658"  cy="578" r="1.5"/>  <circle cx="722"  cy="722" r="1.5"/>
    <circle cx="488"  cy="818" r="1.5"/>  <circle cx="388"  cy="958" r="1.8"/>
    <circle cx="158"  cy="898" r="1.5"/>  <circle cx="902"  cy="184" r="1.5"/>
    <circle cx="1054" cy="574" r="1.5"/>  <circle cx="854"  cy="654" r="1.5"/>
    <circle cx="754"  cy="844" r="1.5"/>  <circle cx="1110" cy="750" r="1.5"/>
    <circle cx="1298" cy="648" r="1.5"/>  <circle cx="1458" cy="578" r="1.5"/>
    <circle cx="1600" cy="650" r="1.5"/>  <circle cx="1754" cy="578" r="1.5"/>
    <circle cx="1850" cy="380" r="1.5"/>  <circle cx="1900" cy="648" r="1.5"/>
    <circle cx="1754" cy="778" r="1.5"/>  <circle cx="1600" cy="900" r="1.8"/>
    <circle cx="1408" cy="950" r="1.5"/>  <circle cx="1208" cy="920" r="1.5"/>
    <circle cx="1008" cy="980" r="1.5"/>  <circle cx="804"  cy="1020" r="1.5"/>
    <circle cx="604"  cy="960" r="1.5"/>  <circle cx="54"   cy="478" r="1.5"/>
    <circle cx="1584" cy="750" r="1.5"/>  <circle cx="1448" cy="148" r="1.5"/>
    <circle cx="1122" cy="88"  r="1.5"/>  <circle cx="1682" cy="88"  r="1.5"/>
  </g>

  <!-- Sharp dot pass -->
  <g fill="#4a9eff">
    <circle cx="122"  cy="184" r="0.9" opacity="0.30"/>
    <circle cx="248"  cy="418" r="0.8" opacity="0.25"/>
    <circle cx="180"  cy="648" r="0.9" opacity="0.22"/>
    <circle cx="382"  cy="178" r="0.8" opacity="0.28"/>
    <circle cx="522"  cy="378" r="0.9" opacity="0.25"/>
    <circle cx="648"  cy="188" r="0.8" opacity="0.22"/>
    <circle cx="658"  cy="578" r="0.9" opacity="0.20"/>
    <circle cx="722"  cy="722" r="0.8" opacity="0.22"/>
    <circle cx="488"  cy="818" r="0.9" opacity="0.20"/>
    <circle cx="388"  cy="958" r="0.8" opacity="0.15"/>
    <circle cx="158"  cy="898" r="0.9" opacity="0.20"/>
    <circle cx="902"  cy="184" r="0.8" opacity="0.25"/>
    <circle cx="1054" cy="574" r="0.9" opacity="0.20"/>
    <circle cx="854"  cy="654" r="0.8" opacity="0.20"/>
    <circle cx="754"  cy="844" r="0.9" opacity="0.18"/>
    <circle cx="1110" cy="750" r="0.8" opacity="0.20"/>
    <circle cx="1298" cy="648" r="0.9" opacity="0.20"/>
    <circle cx="1458" cy="578" r="0.8" opacity="0.22"/>
    <circle cx="1600" cy="650" r="0.9" opacity="0.20"/>
    <circle cx="1754" cy="578" r="0.8" opacity="0.20"/>
    <circle cx="1850" cy="380" r="0.9" opacity="0.22"/>
    <circle cx="1900" cy="648" r="0.8" opacity="0.18"/>
    <circle cx="1754" cy="778" r="0.9" opacity="0.18"/>
    <circle cx="1600" cy="900" r="0.8" opacity="0.15"/>
    <circle cx="1408" cy="950" r="0.9" opacity="0.15"/>
    <circle cx="1208" cy="920" r="0.8" opacity="0.15"/>
    <circle cx="1008" cy="980" r="0.9" opacity="0.15"/>
    <circle cx="804"  cy="1020" r="0.8" opacity="0.12"/>
    <circle cx="604"  cy="960" r="0.9" opacity="0.15"/>
    <circle cx="54"   cy="478" r="0.8" opacity="0.20"/>
    <circle cx="1584" cy="750" r="0.9" opacity="0.18"/>
