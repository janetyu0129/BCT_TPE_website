  <!-- ════════════════════════════════════════════
       LAYER 7 — GEOMETRIC ACCENT LINES
       Very faint structural lines for depth
       ════════════════════════════════════════════ -->

  <!-- Radial rays from focal node (breadth of composition) -->
  <g stroke="#1e90ff" stroke-opacity="0.055" stroke-width="0.5" fill="none">
    <line x1="1350" y1="220" x2="0"    y2="820"/>
    <line x1="1350" y1="220" x2="1920" y2="900"/>
    <line x1="1350" y1="220" x2="798"  y2="1080"/>
    <line x1="1350" y1="220" x2="0"    y2="0"/>
    <line x1="1350" y1="220" x2="1920" y2="0"/>
  </g>

  <!-- "Dawn rays" fanning from upper-right edge -->
  <g stroke="#00d4ff" stroke-opacity="0.048" stroke-width="0.55" fill="none">
    <line x1="1200" y1="0" x2="1920" y2="480"/>
    <line x1="1400" y1="0" x2="1920" y2="328"/>
    <line x1="1620" y1="0" x2="1920" y2="208"/>
  </g>

  <!-- ════════════════════════════════════════════
       LAYER 8 — VIGNETTE (always last)
       ════════════════════════════════════════════ -->
  <rect width="1920" height="1080" fill="url(#vgn)"/>

</svg>
